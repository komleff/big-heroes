<style>
*{box-sizing:border-box;margin:0;padding:0}
.ph{width:390px;max-width:100%;margin:0 auto;background:linear-gradient(180deg,#3a8ec2 0%,#7ec8e3 30%,#a8d8a8 60%,#78b060 100%);border-radius:20px;font-family:system-ui,-apple-system,sans-serif;color:#fff;overflow:hidden;display:flex;flex-direction:column;min-height:800px}
.hdr{display:flex;align-items:center;padding:10px 12px 4px;gap:6px}
.hdr-av{width:36px;height:36px;border-radius:10px;background:#fff;border:2px solid #5EC040;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-nick{font-size:13px;font-weight:500;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.hdr-right{margin-left:auto;display:flex;gap:6px}
.cur{background:rgba(0,0,0,.35);border-radius:16px;padding:3px 6px 3px 8px;display:flex;align-items:center;gap:4px;font-size:13px;font-weight:500}
.cur-plus{width:18px;height:18px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;cursor:pointer}
.cur-plus:hover{background:rgba(255,255,255,.35)}
.league-bar-area{text-align:center;padding:6px 14px 0}
.league-nm{font-size:14px;font-weight:500;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.league-bar-wrap{background:rgba(0,0,0,.25);border-radius:8px;height:22px;margin-top:3px;overflow:hidden;position:relative;border:1px solid rgba(255,255,255,.1)}
.league-bar-fill{height:100%;width:65%;background:linear-gradient(90deg,#5EC040,#8FE070);border-radius:7px}
.league-bar-text{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;text-shadow:0 1px 1px rgba(0,0,0,.4)}
.hero-zone{flex:1;display:flex;align-items:center;justify-content:center;padding:4px 12px;position:relative}
.sq-btn{width:56px;height:56px;background:rgba(0,0,0,.35);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;gap:1px;border:1.5px solid rgba(255,255,255,.1);transition:all .15s;position:relative}
.sq-btn:hover{background:rgba(0,0,0,.5);border-color:rgba(255,255,255,.25)}
.sq-btn svg{width:20px;height:20px}
.sq-btn span{font-size:8px;color:rgba(255,255,255,.7)}
.sq-dot{width:6px;height:6px;border-radius:50%;background:#E53E3E;position:absolute;top:4px;right:4px}
.hero-col{flex:1;display:flex;flex-direction:column;align-items:center}
.hero-char{width:130px;height:150px;background:rgba(0,0,0,.06);border-radius:18px;display:flex;align-items:center;justify-content:center}
.hero-char svg{width:70px;height:70px}
.hero-mass{font-size:34px;font-weight:500;color:#4AE0E0;text-shadow:0 2px 4px rgba(0,0,0,.4);margin-top:2px}
.hero-stats{font-size:12px;color:rgba(255,255,255,.8);text-shadow:0 1px 1px rgba(0,0,0,.3);margin-top:2px}
.slots{display:flex;gap:6px;margin-top:8px;justify-content:center}
.slot{width:80px;background:rgba(0,0,0,.3);border-radius:12px;padding:6px 4px;text-align:center;cursor:pointer;border:1.5px solid rgba(255,255,255,.1);transition:border-color .15s}
.slot:hover{border-color:rgba(255,255,255,.35)}
.slot-nm{font-size:9px;color:rgba(255,255,255,.7)}
.slot-stat{font-size:10px;font-weight:500;margin-top:1px}
.slot-dur{display:flex;justify-content:center;gap:2px;margin-top:3px}
.pip{width:12px;height:3px;border-radius:1px}
.p-on{background:#5EC040}.p-off{background:rgba(255,255,255,.15)}
.belt{display:flex;gap:5px;margin-top:8px;justify-content:center}
.bs{width:60px;background:rgba(0,0,0,.25);border-radius:10px;padding:5px 3px;text-align:center;min-height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.08)}
.bs-nm{font-size:8px;color:rgba(255,255,255,.6);margin-top:2px}
.bs-lock{display:flex;flex-direction:column;align-items:center;gap:1px}
.bs-lock svg{width:14px;height:14px;opacity:.3}
.bs-lock span{font-size:7px;color:rgba(255,255,255,.25)}
.bottom{padding:6px 12px 8px}
.act-row{display:flex;gap:6px;align-items:stretch;margin-bottom:5px}
.btn-big{flex:1;border-radius:14px;padding:14px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;border:2px solid rgba(255,255,255,.15);color:#fff;font-size:17px;font-weight:500;transition:all .12s;text-shadow:0 1px 2px rgba(0,0,0,.3)}
.btn-big:active{transform:scale(.98)}
.btn-pve{background:#5EC040}
.btn-pvp{background:#D946A8}
.btn-big svg{width:18px;height:18px;flex-shrink:0}
.btn-big .tk{margin-left:auto;display:flex;align-items:center;gap:4px;font-size:13px;opacity:.9}
.spacer{width:56px;flex-shrink:0}
.arena-hint{text-align:center;font-size:11px;color:#5EC040;text-shadow:0 1px 1px rgba(0,0,0,.3);margin-top:2px;margin-bottom:2px}
.footer{display:flex;background:rgba(0,0,0,.5);padding:6px 0 10px;border-top:1px solid rgba(255,255,255,.08)}
.ft{flex:1;text-align:center;padding:4px 0;cursor:pointer}
.ft svg{width:22px;height:22px;display:block;margin:0 auto 2px}
.ft span{font-size:9px;color:rgba(255,255,255,.5)}
.ft.act svg{stroke:#FFD700}
.ft.act span{color:#FFD700}
</style>
